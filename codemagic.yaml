workflows:
  ios-shorebird:
    name: 🚀 Shorebird iOS Release / Patch
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "Elearning Phong Key"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
      # Dat false de tranh truong hop 2 workflow cung nhanh tu huy lan nhau khi day commit lien tiep.
      cancel_previous_builds: false

    environment:
      flutter: 3.41.4
      vars:
        FLUTTER_VERSION: "3.41.4"
        IOS_TARGET_PATCH_VERSION: "1.1.12+58"
        IOS_BUNDLE_ID: "vn.com.vietinbank.toituhoc"
        IOS_CERT_COMMON_NAME: "Apple Distribution: Le Nhung (6KYDAR364C)"
      groups:
        - shorebird_vars

    scripts:
      - name: 🚀 Kiem tra tag va build iOS bang Shorebird
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          ACTUAL_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Tin nhan commit thuc te la: $ACTUAL_COMMIT_MSG"

          WANT_IOS_RELEASE=0
          WANT_IOS_PATCH=0

          if [[ "$ACTUAL_COMMIT_MSG" == *"[Release iOS]"* ]]; then WANT_IOS_RELEASE=1; fi
          if [[ "$ACTUAL_COMMIT_MSG" == *"[Patch iOS]"* ]]; then WANT_IOS_PATCH=1; fi

          if [ "$WANT_IOS_RELEASE" -eq 0 ] && [ "$WANT_IOS_PATCH" -eq 0 ]; then
            echo "Khong co tag iOS. Bo qua workflow iOS."
            echo "Tag hop le cho iOS: [Release iOS] hoac [Patch iOS]."
            exit 0
          fi

          if [ $((WANT_IOS_RELEASE + WANT_IOS_PATCH)) -gt 1 ]; then
            echo "ERROR: Chi duoc dung 1 tag iOS trong mot commit: [Release iOS] hoac [Patch iOS]."
            exit 1
          fi

          require_var() {
            local var_name="$1"
            if [ -z "${!var_name:-}" ]; then
              echo "ERROR: Thieu bien moi truong: $var_name"
              exit 1
            fi
          }

          require_common_app_vars() {
            require_var GROQ_API_KEY
          }

          require_shorebird_vars() {
            require_var SHOREBIRD_TOKEN
          }

          setup_ios_signing() {
            echo "1. Thiet lap chung chi Apple..."
            keychain initialize

            require_var IOS_DISTRIBUTION_P12_BASE64
            require_var IOS_DISTRIBUTION_P12_PASSWORD
            require_var IOS_SIGNING_CERT_ID
            require_var IOS_BUNDLE_ID
            require_var IOS_CERT_COMMON_NAME

            P12_PATH="/tmp/ios_distribution_temp.p12"
            KEY_RAW="/tmp/ios_distribution_private_raw.key"
            KEY_PEM="/tmp/ios_distribution_private.pem"
            CERT_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
            PROFILE_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
            MOBILE_PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            KEYCHAIN_PATH_SAFE="${CM_KEYCHAIN_PATH:-}"

            mkdir -p "$CERT_DIR" "$PROFILE_DIR" "$MOBILE_PROFILE_DIR"

            export P12_PATH
            python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["P12_PATH"]).write_bytes(base64.b64decode(os.environ["IOS_DISTRIBUTION_P12_BASE64"]))'

            echo "Trich private key tu p12 local..."
            openssl pkcs12 -in "$P12_PATH" -nocerts -nodes \
              -passin pass:"$IOS_DISTRIBUTION_P12_PASSWORD" \
              -out "$KEY_RAW"

            awk 'BEGIN{p=0} /-----BEGIN .*PRIVATE KEY-----/{p=1} p{print} /-----END .*PRIVATE KEY-----/{p=0}' "$KEY_RAW" > "$KEY_PEM"
            grep -q "BEGIN .*PRIVATE KEY" "$KEY_PEM" || (echo "ERROR: Private key PEM not found" && exit 1)

            echo "Don profile va certificate cache cu..."
            rm -f "$MOBILE_PROFILE_DIR"/*.mobileprovision || true
            rm -f "$PROFILE_DIR"/*.mobileprovision || true
            rm -f "$CERT_DIR"/*.p12 || true

            if [ -n "$KEYCHAIN_PATH_SAFE" ]; then
              echo "Chi giu keychain tam cua Codemagic trong search list..."
              security list-keychains -d user -s "$KEYCHAIN_PATH_SAFE"
            else
              echo "CM_KEYCHAIN_PATH khong co san. Bo qua buoc gioi han keychain."
            fi

            echo "Fetch signing files tu Apple cho bundle id: $IOS_BUNDLE_ID"
            app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" \
              --type IOS_APP_STORE \
              --create \
              --delete-stale-profiles \
              --strict-match-identifier \
              --certificate-key @file:"$KEY_PEM" \
              --verbose

            echo "Chi chon dung cert theo CERT ID da khai bao..."
            shopt -s nullglob
            MATCHED_CERTS=("$CERT_DIR"/DISTRIBUTION_"$IOS_SIGNING_CERT_ID"_*.p12)
            shopt -u nullglob

            if [ ${#MATCHED_CERTS[@]} -eq 0 ]; then
              echo "ERROR: Khong tim thay p12 cho cert id $IOS_SIGNING_CERT_ID"
              echo "Danh sach certificate dang co:"
              ls -l "$CERT_DIR" || true
              exit 1
            fi

            if [ ${#MATCHED_CERTS[@]} -gt 1 ]; then
              echo "ERROR: Tim thay nhieu hon 1 p12 cho cert id $IOS_SIGNING_CERT_ID"
              printf '%s\n' "${MATCHED_CERTS[@]}"
              exit 1
            fi

            SELECTED_CERT="${MATCHED_CERTS[0]}"
            echo "Import dung cert da chi dinh:"
            echo "$SELECTED_CERT"
            keychain add-certificates --certificate "$SELECTED_CERT"

            echo "Lay SHA1 cua cert vua import de khoa dung signing identity..."

            SECURITY_KEYCHAIN_ARGS=()
            if [ -n "${KEYCHAIN_PATH_SAFE:-}" ]; then
              SECURITY_KEYCHAIN_ARGS=("$KEYCHAIN_PATH_SAFE")
            fi

            CERT_SHA1="$(
              security find-identity -v -p codesigning "${SECURITY_KEYCHAIN_ARGS[@]}"               | awk -v cn="$IOS_CERT_COMMON_NAME" 'index($0, "\"" cn "\"") {print $2; exit}'
            )"

            if [ -z "$CERT_SHA1" ]; then
              echo "ERROR: Khong lay duoc SHA1 cua signing identity: $IOS_CERT_COMMON_NAME"
              echo "Danh sach signing identities hien co:"
              security find-identity -v -p codesigning "${SECURITY_KEYCHAIN_ARGS[@]}" || true
              exit 1
            fi

            echo "SHA1 duoc su dung: $CERT_SHA1"

            echo "Gan provisioning profile vao Xcode project va tao export_options.plist..."
            xcode-project use-profiles \
              --project ios/Runner.xcodeproj \
              --archive-method app-store \
              --custom-export-options='{"manageAppVersionAndBuildNumber":false}'

            echo "Khoa export_options.plist vao dung cert SHA1..."
            /usr/libexec/PlistBuddy -c "Set :signingCertificate $CERT_SHA1" "$HOME/export_options.plist" \
              || /usr/libexec/PlistBuddy -c "Add :signingCertificate string $CERT_SHA1" "$HOME/export_options.plist"

            echo "Kiem tra export_options.plist sau khi cap nhat..."
            /usr/libexec/PlistBuddy -c "Print" "$HOME/export_options.plist" || true

            echo "Kiem tra signing identities trong keychain..."
            security find-identity -v -p codesigning "${SECURITY_KEYCHAIN_ARGS[@]}" || true
          }

          install_shorebird() {
            echo "2. Cai dat Shorebird..."
            curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
            export PATH="$HOME/.shorebird/bin:$PATH"
            echo "PATH=$HOME/.shorebird/bin:$PATH" >> "$CM_ENV"
            shorebird --version
          }

          fetch_dependencies() {
            echo "Lay dependencies Flutter..."
            flutter pub get
          }

          run_ios_release() {
            echo "PHAT HIEN [Release iOS] -> Dong goi ban moi iOS..."
            require_common_app_vars
            require_shorebird_vars
            setup_ios_signing
            install_shorebird
            fetch_dependencies
            echo "3. Build IPA bang Shorebird..."
            shorebird release ios \
              --flutter-version="$FLUTTER_VERSION" \
              --no-confirm \
              --build-number="$BUILD_NUMBER" \
              --dart-define=GROQ_API_KEY="$GROQ_API_KEY" \
              --export-options-plist="$HOME/export_options.plist"
          }

          run_ios_patch() {
            echo "PHAT HIEN [Patch iOS] -> Tao ban va iOS..."
            require_common_app_vars
            require_shorebird_vars
            setup_ios_signing
            install_shorebird
            fetch_dependencies
            echo "3. Tao Patch iOS cho phien ban: $IOS_TARGET_PATCH_VERSION..."
            shorebird patch ios \
              --release-version="$IOS_TARGET_PATCH_VERSION" \
              --no-confirm \
              --allow-asset-diffs \
              --dart-define=GROQ_API_KEY="$GROQ_API_KEY" \
              --export-options-plist="$HOME/export_options.plist"
            rm -rf build/ios/ipa/*.ipa || true
          }

          if [ "$WANT_IOS_RELEASE" -eq 1 ]; then run_ios_release; fi
          if [ "$WANT_IOS_PATCH" -eq 1 ]; then run_ios_patch; fi

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

  web-cloudflare-deploy:
    name: 🌐 Build Web & Deploy Cloudflare Pages
    instance_type: linux_x2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
      # Dat false de workflow web va iOS co the cung duoc tao tu cung mot commit.
      cancel_previous_builds: false

    environment:
      flutter: 3.41.4
      vars:
        CLOUDFLARE_PROJECT_NAME: "toituhoc"
      groups:
        - shorebird_vars

    scripts:
      - name: 🌐 Kiem tra tag, build Web va deploy Cloudflare Pages
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          ACTUAL_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Tin nhan commit thuc te la: $ACTUAL_COMMIT_MSG"

          if [[ "$ACTUAL_COMMIT_MSG" != *"[Deploy Web]"* ]]; then
            echo "Khong co tag [Deploy Web]. Bo qua workflow Web."
            exit 0
          fi

          require_var() {
            local var_name="$1"
            if [ -z "${!var_name:-}" ]; then
              echo "ERROR: Thieu bien moi truong: $var_name"
              exit 1
            fi
          }

          require_var GROQ_API_KEY
          require_var CLOUDFLARE_API_TOKEN
          require_var CLOUDFLARE_ACCOUNT_ID
          require_var CLOUDFLARE_PROJECT_NAME

          echo "Lay dependencies Flutter..."
          flutter pub get

          echo "Build Flutter Web..."
          flutter build web --release \
            --dart-define=GROQ_API_KEY="$GROQ_API_KEY"

          echo "Deploy len Cloudflare Pages..."
          npx wrangler pages deploy build/web \
            --project-name="$CLOUDFLARE_PROJECT_NAME"

    artifacts:
      - build/web/**
